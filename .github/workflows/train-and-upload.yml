name: Train and Upload to Hugging Face

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  train-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@4

      - name: Set up Python
        uses: actions/setup-python@5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train model
        run: python train.py

      - name: Upload to Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'EOF'
          import os
          from huggingface_hub import HfApi

          token = os.environ["HF_TOKEN"]
          repo_id = "yuanpengjie/imdb-sentiment-analyzer"
          api = HfApi()

          api.create_repo(repo_id, token=token, exist_ok=True)

          files = [
              "model.joblib",
              "tfidf_vectorizer.joblib",
              "train.py",
              "requirements.txt",
              "imdb_top_500.csv",
              "README.md"
          ]

          for filename in files:
              if os.path.exists(filename):
                  api.upload_file(
                      path_or_fileobj=filename,
                      path_in_repo=filename,
                      repo_id=repo_id,
                      token=token,
                  )
                  print(f"Uploaded: {filename}")

          print("✅ 全部上传完成！")
          print(f"访问地址: https://huggingface.co/{repo_id}")
          EOF
